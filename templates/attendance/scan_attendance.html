{% extends "layout/base.html" %}

{% block content %}

<style>

body{
background:#f5f8ff;
font-family:Segoe UI;
}

.scan-box{

max-width:550px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.15);

}

.scan-box h2{

text-align:center;
color:#004aad;
margin-bottom:30px;

}

.form-group{

margin-bottom:20px;

}

label{

font-weight:bold;
display:block;
margin-bottom:8px;

}

input{

width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;

}

button{

width:100%;
padding:15px;
background:#004aad;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#00337a;

}

</style>

<div class="scan-box">

<h2>QR Attendance Form</h2>

<form method="POST">

<div class="form-group">

<label>Name</label>

<input
type="text"
name="name"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
name="email"
required>

</div>

<div class="form-group">

<label>ATI Number</label>

<input
type="text"
name="ati_number"
required>

</div>

<button type="submit">

Mark Attendance

</button>

</form>

</div>

{% endblock %}
