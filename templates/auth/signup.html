<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | QR Attendance System</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}


body{

    min-height:100vh;

    background:#061a35;

    display:flex;

    justify-content:center;

    align-items:center;

}


/* Main Card */

.container{

    width:900px;

    height:650px;

    background:white;

    display:flex;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 20px 50px rgba(0,0,0,0.4);

}



/* Left Side */


.left-section{

    width:45%;

    background:linear-gradient(
        160deg,
        #002b5c,
        #004aad
    );

    color:white;

    padding:50px;

    display:flex;

    flex-direction:column;

    justify-content:center;

}



.left-section h1{

    font-size:38px;

    margin-bottom:20px;

}


.left-section p{

    color:#d8e8ff;

    line-height:1.7;

    font-size:17px;

}



.system-info{

    margin-top:35px;

}


.system-info div{

    margin-bottom:15px;

    font-size:16px;

}



/* Right Side */


.right-section{

    width:55%;

    padding:55px;

}



.right-section h2{

    color:#002b5c;

    font-size:32px;

    margin-bottom:10px;

}



.subtitle{

    color:#777;

    margin-bottom:30px;

}



/* Form */


.form-group{

    margin-bottom:20px;

}



label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

    color:#333;

}



input,select{

    width:100%;

    padding:13px;

    border:1px solid #ddd;

    border-radius:8px;

    font-size:15px;

}



input:focus,
select:focus{

    outline:none;

    border-color:#004aad;

}




button{

    width:100%;

    padding:14px;

    margin-top:10px;

    background:#004aad;

    color:white;

    border:none;

    border-radius:8px;

    font-size:17px;

    cursor:pointer;

}



button:hover{

    background:#002b5c;

}



/* Signup Link */


.signup{

    text-align:center;

    margin-top:25px;

    color:#555;

}


.signup a{

    color:#004aad;

    font-weight:bold;

    text-decoration:none;

}



/* Responsive */


@media(max-width:800px){


.container{

    width:70%;

    height:auto;

    flex-direction:column;

}


.left-section,
.right-section{

    width:100%;

}


}


</style>


</head>



<body>



<div class="container">



<!-- Left Branding -->


<div class="left-section">


<h1>
QR Attendance
</h1>


<p>

Secure login portal for students,
lecturers and administrators.

</p>



<div class="system-info">


<div>
🔐 Secure Authentication
</div>


<div>
📱 QR Based Attendance
</div>


<div>
📊 Real-Time Reports
</div>


<div>
🎓 University Management
</div>



</div>



</div>





<!-- Login Form -->


<div class="right-section">


<h2>
Welcome Back
</h2>


<p class="subtitle">
Login to access your dashboard
</p>




<form method="POST">


<div class="form-group">

<label>
    Full Name
</label>

<input 
    type="text"
    name="name"
    placeholder="Full Name"
    required>


<div class="form-group">

<label>
Email Address
</label>


<input 
type="email"
name="email"
placeholder="Enter your email"
required>


</div>





<div class="form-group">

<label>
Password
</label>


<input 
type="password"
name="password"
placeholder="Enter your password"
required>


</div>





<div class="form-group">

<label>
Login As
</label>


<select name="role" required>


<option value="">
Select your role
</option>


<option value="student">
Student
</option>


<option value="lecturer">
Lecturer
</option>


<option value="admin">
Admin
</option>


</select>


</div>




<button type="submit">

SignUp

</button>




</form>









</div>



</div>



</body>

</html>
