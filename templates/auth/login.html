<!DOCTYPE html>

<html>

<head>

<title>Login</title>

</head>


<body>


<h1>Login</h1>



<form method="POST">



<label>Email</label>

<input type="email" name="email" required>


<br>


<label>Password</label>

<input type="password" name="password" required>


<br>


<label>Role</label>


<select name="role">


<option value="student">
Student
</option>


<option value="lecturer">
Lecturer
</option>


<option value="admin">
Admin
</option>


</select>


<br>


<button type="submit">

Login

</button>



</form>


<a href="/signup">
Create Account
</a>


</body>


</html>
