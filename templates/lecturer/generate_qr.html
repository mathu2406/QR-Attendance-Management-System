{% extends "layout/base.html" %}

{% block content %}

<h2>Generate QR Code</h2>

<form method="POST">

    <input
        type="text"
        name="subject"
        placeholder="Subject"
        required>

    <button type="submit">
        Generate QR
    </button>

</form>

{% if qr_image %}

    <h3>Scan this QR</h3>

    <img
        src="{{ url_for('static', filename='qr/' + qr_image) }}"
        width="300">

{% endif %}

{% endblock %}
