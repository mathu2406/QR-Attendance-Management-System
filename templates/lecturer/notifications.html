{% extends "layout/base.html" %}

{% block content %}

<h2>Notifications</h2>

<table border="1" cellpadding="10">

<tr>
    <th>Student</th>
    <th>Subject</th>
    <th>Message</th>
    <th>Time</th>
</tr>

{% for n in notifications %}

<tr>
    <td>{{ n.student_name }}</td>
    <td>{{ n.subject }}</td>
    <td>{{ n.message }}</td>
    <td>{{ n.created_at }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
