<h2>Welcome {{ user.name }}</h2>

<h3>Attendance: {{ user.attendance }}%</h3>

{% if user.attendance >= 80 %}
<p style="color:green;">Eligible</p>
{% else %}
<p style="color:red;">Not Eligible</p>
{% endif %}

<hr>

<h3>Attendance History (QR Scans)</h3>

<table border="1" width="100%">
<tr>
    <th>Subject</th>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r.subject }}</td>
    <td>{{ r.date }}</td>
    <td>{{ r.status }}</td>
</tr>
{% endfor %}
</table>
